function shuffle(arr, seed) {
  const a=[...arr]; let s=seed;
  for(let i=a.length-1;i>0;i--){s=(s*9301+49297)%233280;const j=Math.floor((s/233280)*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function CharAvatar({characterName, profileColor}) {
  const cols = characterColors[characterName] || [profileColor, profileColor+"99"];
  const words = characterName.split(" ");
  const initials = words.length >= 2 ? words[0][0]+words[words.length-1][0] : characterName.slice(0,2);
  return (
    <div style={{position:"relative",width:200,height:200,margin:"0 auto 16px",animation:"float 3s ease-in-out infinite"}}>
      <div style={{position:"absolute",inset:-6,borderRadius:"50%",background:`conic-gradient(${profileColor}cc,#fff,${profileColor}cc)`,animation:"spin 4s linear infinite",opacity:0.6}}/>
      <div style={{position:"absolute",inset:-2,borderRadius:"50%",background:"white"}}/>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",overflow:"hidden",background:`linear-gradient(135deg,${cols[0]},${cols[1]})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:56,fontWeight:900,color:"white",opacity:0.25,lineHeight:1}}>{initials.toUpperCase()}</span>
        <span style={{position:"absolute",fontSize:20,fontWeight:900,color:"white",textAlign:"center",padding:"0 12px",textShadow:"0 2px 8px rgba(0,0,0,0.3)",lineHeight:1.2}}>{characterName}</span>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("intro");
  const [name, setName] = useState("");
  const [gender, setGender] = useState("");
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [result, setResult] = useState(null);
  const [selected, setSelected] = useState(null);

  const seed = useMemo(() => Date.now(), []);
  const shuffledQ = useMemo(() => rawQuestions.map((q,qi) => ({...q, options: shuffle(q.options, seed+qi*137)})), [seed]);

  const goBack = () => {
    if(current===0){setScreen("intro");setAnswers([]);setSelected(null);return;}
    setCurrent(c=>c-1);setAnswers(a=>a.slice(0,-1));setSelected(null);
  };

  const handleAnswer = (disc) => {
    if(selected) return;
    setSelected(disc);
    setTimeout(() => {
      const na = [...answers, disc];
      if(current+1 < shuffledQ.length){setAnswers(na);setCurrent(c=>c+1);setSelected(null);}
      else{setAnswers(na);calcResult(na);}
    }, 380);
  };

  const calcResult = async (ans) => {
    setScreen("loading");
    const counts = {D:0,I:0,S:0,C:0};
    ans.forEach(a => counts[a]++);
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const dom = sorted[0][0], sec = sorted[1][0];
    const pool = characters[dom].filter(c => gender==="M" ? true : c.gender==="F");
    const fp = pool.length>0 ? pool : characters[dom];

    const summary = shuffledQ.map((q,i) => {
      const opt = q.options.find(o => o.disc===ans[i]);
      return `${i+1}. ${q.text} → ${opt?.text}`;
    }).join("\n");

    const prompt = `Especialista em DISC e cultura pop. Tom: divertido, elogioso, leve.
DISC: D=assertivo,urgente,direto | I=comunicativo,entusiasta,relações | S=consistente,leal,escuta | C=analítico,detalhista,dados
Nome: ${name} | Gênero: ${gender==="M"?"Masculino":"Feminino"}
Dominante: ${dom} | Secundário: ${sec} | D=${counts.D} I=${counts.I} S=${counts.S} C=${counts.C}
Respostas:\n${summary}
Personagens: ${fp.map(c=>c.name).join(", ")}
Escolha UM considerando nuances. S: não use "mãe do time". Sem métricas comerciais.
Para characterDesc: 4-5 frases robustas e divertidas sobre o personagem e por que representa ${name}.
JSON sem markdown:
{"character":"nome exato","reason":"2 frases criativas e elogiosas","characterDesc":"descrição 4-5 frases","superpower":"superpoder em uma frase"}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.map(i=>i.text||"").join("")||"";
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      const charData = fp.find(c=>c.name===parsed.character)||fp[0];
      setResult({profile:dom,counts,character:charData,reason:parsed.reason,characterDesc:parsed.characterDesc,superpower:parsed.superpower});
    } catch {
      const charData = fp[Math.floor(Math.random()*fp.length)];
      setResult({profile:dom,counts,character:charData,reason:`${name} combina perfeitamente com ${charData.name}!`,characterDesc:`${charData.name} é um personagem icônico que representa ${name}.`,superpower:"Transformar complexidade em clareza"});
    }
    setScreen("result");
  };

  const restart = () => {setScreen("intro");setName("");setGender("");setCurrent(0);setAnswers([]);setResult(null);setSelected(null);};

  const card = (children, extra={}) => (
    <div style={{background:"white",borderRadius:20,padding:20,marginBottom:12,boxShadow:"0 4px 20px rgba(160,80,200,0.1)",...extra}}>{children}</div>
  );

  if(screen==="intro") return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:32,animation:"fadeIn 0.6s ease"}}>
        <div style={{fontSize:64,marginBottom:8}}>✨</div>
        <h1 style={{fontSize:28,fontWeight:900,color:"#5b2d8e",margin:0}}>Qual personagem você é?</h1>
        <p style={{color:"#b06fcc",fontSize:15,marginTop:8,fontWeight:600}}>Descubra seu perfil DISC e seu alter ego mágico!</p>
      </div>
      <div style={{background:"white",borderRadius:24,padding:32,width:"100%",maxWidth:420,boxShadow:"0 8px 40px rgba(180,100,220,0.13)"}}>
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontWeight:700,color:"#5b2d8e",marginBottom:8}}>Seu nome ✏️</label>
          <input style={{width:"100%",borderRadius:14,padding:"12px 16px",border:"2px solid #e8d5f5",fontSize:16,color:"#3d1a6e",outline:"none",background:"#fdf8ff"}}

            onKeyDown={e=>e.key==="Enter"&&name.trim()&&gender&&setScreen("quiz")}/>
        </div>
        <div style={{marginBottom:28}}>
          <label style={{display:"block",fontWeight:700,color:"#5b2d8e",marginBottom:10}}>Você é 👇</label>
          <div style={{display:"flex",gap:12}}>

              <button key={v} onClick={()=>setGender(v)} style={{flex:1,padding:"12px 8px",borderRadius:14,fontWeight:700,fontSize:15,cursor:"pointer",background:gender===v?"linear-gradient(135deg,#ff6b9d,#c44dcc)":"#fdf4ff",color:gender===v?"white":"#9b59b6",border:gender===v?"2px solid #ff6b9d":"2px solid #e8d5f5"}}>{l}</button>

          </div>
        </div>
        <button onClick={()=>setScreen("quiz")} disabled={!name.trim()||!gender} style={{width:"100%",padding:"14px 0",borderRadius:16,fontWeight:900,fontSize:17,cursor:name.trim()&&gender?"pointer":"not-allowed",background:name.trim()&&gender?"linear-gradient(135deg,#ff6b9d,#c44dcc)":"#e8d5f5",color:name.trim()&&gender?"white":"#b09cc0",border:"none"}}>
          Começar o Quiz 🚀
        </button>
      </div>
      <p style={{color:"#c094d8",fontSize:13,marginTop:20,fontWeight:600}}>13 perguntas · ~4 minutos</p>
    </div>

  if(screen==="loading") return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:72,marginBottom:20,animation:"bounce 1s infinite"}}>🔮</div>
      <h2 style={{fontSize:24,fontWeight:900,color:"#5b2d8e",marginBottom:8}}>Analisando seu perfil...</h2>
      <p style={{color:"#b06fcc",fontSize:15,fontWeight:600,marginBottom:32}}>A IA está encontrando seu personagem ideal!</p>
      <div style={{display:"flex",gap:10}}>
        {["#ff6b9d","#ffaa00","#6bcb77","#a29bfe"].map((c,i)=>(
          <div key={i} style={{width:14,height:14,borderRadius:"50%",background:c,animation:`bounce 0.8s infinite ${i*0.15}s`}}/>

    </div>

  if(screen==="result"&&result) {
    const {profile,counts,character,reason,characterDesc,superpower} = result;
    const pi = profileDescriptions[profile];
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    return (
      <div style={{minHeight:"100vh",background:bg,padding:"24px 16px 48px"}}>
        <div style={{maxWidth:460,margin:"0 auto",animation:"fadeIn 0.5s ease"}}>
          <div style={{textAlign:"center",paddingTop:16,marginBottom:20}}>
            <CharAvatar characterName={character.name} profileColor={pi.color}/>
            <h1 style={{fontSize:38,fontWeight:900,color:"#3d1a6e",margin:"0 0 4px"}}>{character.name}</h1>
            <p style={{color:"#b06fcc",fontSize:13,fontWeight:600,margin:"0 0 10px"}}>{characterOrigins[character.name]}</p>
            <div style={{display:"inline-block",padding:"6px 22px",borderRadius:50,fontWeight:800,fontSize:15,color:"white",background:`linear-gradient(135deg,${pi.color},${pi.color}cc)`}}>
              Perfil {profile} — {pi.title}
            </div>
          </div>
          {card(<><p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 10px"}}>🎭 Seu personagem</p><p style={{color:"#3d1a6e",fontSize:15,lineHeight:1.75,margin:0,fontWeight:600}}>{characterDesc}</p></>, {border:`2px solid ${pi.color}33`})}
          {card(<><p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 8px"}}>🪄 Por que você é {character.name}</p><p style={{color:"#3d1a6e",fontSize:15,lineHeight:1.7,margin:0,fontWeight:600}}>{reason}</p></>, {borderLeft:`4px solid ${pi.color}`})}
          {card(<><p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 6px"}}>⚡ Seu superpoder</p><p style={{color:"#3d1a6e",fontSize:17,fontWeight:800,margin:0}}>{superpower}</p></>)}
          <div style={{background:`linear-gradient(135deg,${pi.color}18,${pi.color}08)`,borderRadius:20,padding:20,marginBottom:12,border:`1.5px solid ${pi.color}44`}}>
            <p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 6px"}}>💡 Dica do seu perfil</p>
            <p style={{color:"#4a2080",fontSize:14,fontWeight:600,margin:0,lineHeight:1.6}}>{pi.tip}</p>
          </div>
          {card(<>
            <p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 14px"}}>📊 Seu perfil DISC</p>
            {Object.entries(counts).map(([k,v])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div><span style={{fontSize:13,fontWeight:800,color:"#5b2d8e"}}>{k} — {discInfo[k].full}</span>
                  <p style={{fontSize:11,color:"#9b7cc0",margin:"1px 0 0",fontWeight:600}}>{discInfo[k].why}</p></div>
                  <span style={{fontSize:14,fontWeight:800,color:profileDescriptions[k].color}}>{Math.round((v/total)*100)}%</span>
                </div>
                <div style={{background:"#f3e8ff",borderRadius:8,height:10,overflow:"hidden"}}>
                  <div style={{height:10,borderRadius:8,width:`${(v/total)*100}%`,background:`linear-gradient(90deg,${profileDescriptions[k].color},${profileDescriptions[k].color}99)`}}/>
                </div>
              </div>
            ))}
          </>)}
          {card(<>
            <p style={{color:"#b06fcc",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 12px"}}>💎 Seus pontos fortes</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {pi.strengths.map(s=>(
                <span key={s} style={{padding:"7px 16px",borderRadius:50,fontSize:13,fontWeight:700,color:"white",background:`linear-gradient(135deg,${pi.color},${pi.color}bb)`}}>{s}</span>
              ))}
            </div>
          </>, {marginBottom:24})}
          <button onClick={restart} style={{width:"100%",padding:"14px 0",borderRadius:16,fontWeight:900,fontSize:16,cursor:"pointer",background:"linear-gradient(135deg,#ff6b9d,#c44dcc)",color:"white",border:"none"}}>
            Fazer novamente 🔄
          </button>
        </div>
      </div>
    );
  }

  const q = shuffledQ[current];
  const progress = (current/shuffledQ.length)*100;
  return (
    <div style={{minHeight:"100vh",background:bg,padding:"20px 16px 40px"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <button onClick={goBack} style={{background:"none",border:"none",cursor:"pointer",color:"#b06fcc",fontWeight:700,fontSize:14,padding:"4px 0"}}>← Voltar</button>
          <span style={{fontSize:13,fontWeight:700,color:"#b06fcc"}}>{current+1} / {shuffledQ.length}</span>
        </div>
        <div style={{background:"#f3e8ff",borderRadius:8,height:8,marginBottom:24,overflow:"hidden"}}>
          <div style={{height:8,borderRadius:8,width:`${progress}%`,background:"linear-gradient(90deg,#ff6b9d,#c44dcc)",transition:"width 0.4s ease"}}/>
        </div>
        <div style={{background:"white",borderRadius:20,padding:"20px 22px 16px",marginBottom:20,boxShadow:"0 4px 24px rgba(160,80,200,0.1)",borderTop:"4px solid #ff6b9d",animation:"fadeIn 0.35s ease"}}>
          <p style={{color:"#3d1a6e",fontSize:17,fontWeight:800,margin:0,lineHeight:1.5}}>{q.text}</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {q.options.map((opt,i)=>(
            <button key={i} onClick={()=>handleAnswer(opt.disc)} disabled={selected!==null}
              style={{width:"100%",textAlign:"left",padding:"14px 18px",borderRadius:16,fontWeight:600,fontSize:15,cursor:selected?"default":"pointer",transition:"all 0.2s",lineHeight:1.5,background:selected===opt.disc?"#f3e8ff":"white",color:"#3d1a6e",border:selected===opt.disc?"2px solid #c44dcc":"2px solid #f0e0ff",transform:selected===opt.disc?"scale(1.02)":"scale(1)"}}>
              <span style={{fontWeight:800,color:"#d580ff",marginRight:10}}>{String.fromCharCode(65+i)}.</span>
              {opt.text}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
